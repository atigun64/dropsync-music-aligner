appId: com.musicmatcher.app
productName: Music Matcher
copyright: Copyright © 2026 Music Matcher
directories:
  output: release
  buildResources: build
icon: icon.png
files:
  - main.js
  - backend.js
  - preload.js
  - package.json
extraResources:
  - from: ../frontend/dist
    to: frontend/dist
  - from: ../dist-backend/music-matcher-backend
    to: backend
linux:
  target:
    - AppImage
  category: Audio
  maintainer: Music Matcher
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
